name: Sync data and deploy to Pages

on:
  schedule:
    # Every 15 min, offset off the top-of-hour cron rush on GH-hosted runners.
    # GitHub may delay or drop scheduled runs under load, so treat this as a
    # best-effort ceiling, not a guarantee. The Python script itself decides
    # whether to do a full in-season sync or a lighter off-season pass.
    - cron: '2,17,32,47 * * * *'
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'archive/**'
  workflow_dispatch:

# Only one deploy at a time; cancel older queued ones rather than queueing up.
concurrency:
  group: pages-sync
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium (only on cron / manual)
        # The in-season sample/status data now lives in DPH's Tableau Cloud
        # workbook, read by fetch_tableau_cloud.py via a headless browser.
        if: github.event_name != 'push'
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run sync (only on cron / manual)
        if: github.event_name != 'push'
        run: python sync_water_data.py

      - name: Commit refreshed data + archive
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data archive
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-sync water data [skip ci]"
            # Another run may have pushed while we were syncing. Rebase and retry.
            for i in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejected, rebasing on origin/main and retrying ($i)..."
              git pull --rebase origin main
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: Stage site/ for Pages deploy
        run: |
          rm -rf site
          mkdir -p site
          # Copy only the files that should be served publicly. Everything else
          # (sync script, archive raw CSVs, PHP proxy, .htaccess, .claude/, etc.)
          # stays out of the deploy artifact.
          cp index.html mystic.html sw.js site/
          cp -R faq site/faq
          # Slug-override table (beach name -> friendly permalink slug); the page
          # fetches it to generate/resolve /beach/<slug>/ links.
          [ -f slug-overrides.json ] && cp slug-overrides.json site/ || true
          cp -R data site/data
          cp -R archive site/archive
          cp -R test-data site/test-data
          [ -f CNAME ] && cp CNAME site/ || true
          # Stamp the deployed commit SHA into the staged meta.json so the page
          # can show which commit is live. It can't go in the committed copy
          # (chicken/egg: the SHA isn't known until the commit that contains it
          # exists), so we patch the deploy artifact only.
          python3 - "$(git rev-parse --short HEAD)" <<'PY'
          import json, pathlib, sys
          p = pathlib.Path("site/data/meta.json")
          meta = json.loads(p.read_text())
          meta["commit"] = sys.argv[1]
          p.write_text(json.dumps(meta, indent=2) + "\n")
          PY
          # Pre-render a clean /beach/<slug>/ permalink for every beach: each is a
          # copy of the app served as a real file (HTTP 200), so shared deep links
          # resolve without a 404 fallback. <base href="/"> in index.html keeps the
          # copies' data/ and archive/ fetches resolving from the site root. A beach
          # that first appears between deploys won't have a dir until the next run —
          # an accepted gap (there's no data to show for it yet anyway).
          python3 - <<'PY'
          import json, pathlib, re
          def derived(name):
              return re.sub(r"[^a-z0-9]+", "-", name.lower()).strip("-")
          overrides = {}
          ov = pathlib.Path("slug-overrides.json")
          if ov.exists():
              try:
                  overrides = json.loads(ov.read_text())
              except Exception:
                  overrides = {}
          beaches = json.loads(pathlib.Path("site/data/beaches.json").read_text()).get("beaches", [])
          app = pathlib.Path("site/index.html").read_text()
          pages = 0
          for b in beaches:
              name = b.get("name", "")
              d = derived(name)
              if not d:
                  continue
              # Friendly slug (if any) plus the derived slug as an alias, so links
              # shared before an override was added still resolve.
              slugs = {d}
              if overrides.get(name):
                  slugs.add(overrides[name])
              for s in slugs:
                  out = pathlib.Path("site/beach", s)
                  out.mkdir(parents=True, exist_ok=True)
                  (out / "index.html").write_text(app)
                  pages += 1
          print(f"pre-rendered {pages} permalink pages for {len(beaches)} beaches "
                f"({len(overrides)} slug overrides)")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
