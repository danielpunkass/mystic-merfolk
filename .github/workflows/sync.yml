name: Sync data and deploy to Pages

on:
  schedule:
    # Hourly, 17 past to avoid the top-of-hour cron rush on GH-hosted runners.
    # The Python script itself decides whether to do a full in-season sync or a
    # lighter off-season pass.
    - cron: '17 * * * *'
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'archive/**'
  workflow_dispatch:

# Only one deploy at a time; cancel older queued ones rather than queueing up.
concurrency:
  group: pages-sync
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium (only on cron / manual)
        # The in-season sample/status data now lives in DPH's Tableau Cloud
        # workbook, read by fetch_tableau_cloud.py via a headless browser.
        if: github.event_name != 'push'
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run sync (only on cron / manual)
        if: github.event_name != 'push'
        run: python sync_water_data.py

      - name: Commit refreshed data + archive
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data archive
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto-sync water data [skip ci]"
            # Another run may have pushed while we were syncing. Rebase and retry.
            for i in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejected, rebasing on origin/main and retrying ($i)..."
              git pull --rebase origin main
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: Stage site/ for Pages deploy
        run: |
          rm -rf site
          mkdir -p site
          # Copy only the files that should be served publicly. Everything else
          # (sync script, archive raw CSVs, PHP proxy, .htaccess, .claude/, etc.)
          # stays out of the deploy artifact.
          cp index.html mystic.html simple.html sw.js site/
          cp -R data site/data
          cp -R archive site/archive
          cp -R test-data site/test-data
          [ -f CNAME ] && cp CNAME site/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
