name: Watch DPH Tableau export

# Background
# ----------
# The in-season sync (sync.yml) fetches the live DPH Beach Water Quality Dashboard
# every 15 min via fetch_tableau_cloud.py and records the outcome in
# data/meta.json: samples.source = "browser" on success, "none" on failure. That
# committed history is a high-resolution log of whether the export is working.
#
# The export normally works; occasional single-run failures are transient
# headless-render flakes, not access blocks (see CLAUDE.md "Export reliability").
# This watchdog therefore alerts only on a SUSTAINED outage — the export failing
# continuously for several hours — by reading the meta.json history rather than
# doing its own one-shot fetch (which would itself be flake-prone). It opens a
# GitHub issue when a sustained outage is detected and auto-closes it on recovery.
#
# No Playwright needed: this only reads git history + parses JSON.

on:
  schedule:
    - cron: '37 */6 * * *'   # every 6h, at :37
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: watch-export
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so meta.json can be walked)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate recent sync outcomes
        id: eval
        run: |
          python3 - <<'PY'
          import json, os, subprocess
          from datetime import datetime

          OUTAGE_HOURS = 4.0   # continuous in-season failure before paging

          def out(k, v):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{k}={v}\n")

          # Commits touching meta.json, newest first (one per sync run).
          hashes = subprocess.run(
              ["git", "log", "-80", "--format=%H", "--", "data/meta.json"],
              capture_output=True, text=True).stdout.split()

          entries = []  # (lastSynced dt, samples.source, season)
          for h in hashes:
              raw = subprocess.run(["git", "show", f"{h}:data/meta.json"],
                                   capture_output=True, text=True).stdout
              if not raw.strip():
                  continue
              try:
                  m = json.loads(raw)
                  dt = datetime.fromisoformat(m["lastSynced"])
              except Exception:
                  continue
              src = (m.get("samples") or {}).get("source")
              entries.append((dt, src, m.get("season")))

          if not entries:
              print("No meta.json history found."); out("outage", "false"); out("reason", "no-history"); raise SystemExit

          latest_dt, latest_src, latest_season = entries[0]

          if latest_season != "in":
              print(f"Off-season (season={latest_season}); outage concept N/A.")
              out("outage", "false"); out("reason", "off-season"); raise SystemExit

          if latest_src == "browser":
              print("Latest sync healthy (samples.source=browser).")
              out("outage", "false"); out("reason", "healthy"); raise SystemExit

          # Walk the consecutive non-browser streak back from newest.
          streak = []
          for dt, src, _ in entries:
              if src == "browser":
                  break
              streak.append(dt)
          oldest = streak[-1]
          span = (latest_dt - oldest).total_seconds() / 3600.0
          print(f"Failing streak: {len(streak)} syncs over {span:.1f}h since {oldest.isoformat()}.")
          out("streak_count", str(len(streak)))
          out("span_hours", f"{span:.1f}")
          out("first_fail", oldest.isoformat())
          out("latest_synced", latest_dt.isoformat())
          out("outage", "true" if span >= OUTAGE_HOURS else "false")
          out("reason", "sustained" if span >= OUTAGE_HOURS else "too-short")
          PY

      - name: Open an issue on sustained outage
        if: steps.eval.outputs.outage == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="DPH Tableau data export appears to be down"
          open=$(gh issue list --state open --json title \
            --jq "[.[] | select(.title==\"$title\")] | length")
          if [ "$open" != "0" ]; then
            echo "An outage issue is already open; not duplicating."
            exit 0
          fi
          body=$(printf '%s\n' \
            "The DPH Beach Water Quality Dashboard export has been failing for a" \
            "sustained period — the in-season sync (sync.yml) has not produced a" \
            "successful live read in hours." \
            "" \
            "Detected by .github/workflows/probe-export.yml from data/meta.json history:" \
            "- Failed syncs in a row: ${{ steps.eval.outputs.streak_count }}" \
            "- Duration: ~${{ steps.eval.outputs.span_hours }}h (since ${{ steps.eval.outputs.first_fail }})" \
            "- Latest sync: ${{ steps.eval.outputs.latest_synced }} (samples.source != browser)" \
            "" \
            "The site is showing the \"unavailable\" state meanwhile. This is longer" \
            "than a transient flake, so it may be a real block: check whether DPH has" \
            "re-revoked getSummaryDataAsync (403 PermissionDeniedException) or changed" \
            "the workbook. Debug with: python3 fetch_tableau_cloud.py" \
            "" \
            "The sync self-heals automatically when the export recovers, and this" \
            "issue will auto-close on the next watchdog run that sees a healthy sync.")
          gh issue create --title "$title" --body "$body"

      - name: Auto-close the outage issue on recovery
        if: steps.eval.outputs.outage == 'false' && steps.eval.outputs.reason == 'healthy'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="DPH Tableau data export appears to be down"
          nums=$(gh issue list --state open --json number,title \
            --jq ".[] | select(.title==\"$title\") | .number")
          for n in $nums; do
            gh issue comment "$n" --body "Export recovered — latest sync reports samples.source=browser. Auto-closing."
            gh issue close "$n"
          done
