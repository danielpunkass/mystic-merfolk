<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shannon Beach Water Quality Dashboard</title>
    <meta name="description" content="Real-time water quality monitoring for Shannon Beach at Upper Mystic Lake">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f0f9ff 100%);
            min-height: 100vh;
            color: #1a365d;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s ease;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th:hover {
            background: linear-gradient(135deg, #0284c7, #0369a1);
        }

        td {
            background: rgba(255, 255, 255, 0.8);
            transition: background 0.2s ease;
        }

        tr:hover td {
            background: rgba(240, 249, 255, 0.8);
        }

        tr:nth-child(even) td {
            background: rgba(241, 250, 255, 0.5);
        }

        tr:nth-child(even):hover td {
            background: rgba(224, 242, 254, 0.8);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-safe {
            background: #dcfce7;
            color: #166534;
        }

        .status-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .status-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .last-updated {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
                font-size: 0.85rem;
            }

            .table-container {
                border-radius: 12px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }
        }

        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0ea5e9;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .refresh-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Shannon Beach Data Dashboard</h1>
            <div class="subtitle">Real-time water quality monitoring for Shannon Beach @ Upper Mystic (DCR)</div>
        </div>
        
        <div class="card">
            <div class="table-container">
                <div id="loading" class="loading">Loading beach data...</div>
                <table id="data-table" style="display: none;">
                    <thead>
                        <tr id="table-head">
                            <!-- Table headers will be inserted here -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Table data will be inserted here -->
                    </tbody>
                </table>
            </div>
            <div id="last-updated" class="last-updated" style="display: none;">
                <!-- Last updated time will be inserted here -->
            </div>
        </div>
    </div>
    
    <div id="refresh-indicator" class="refresh-indicator">
        Refreshing data...
    </div>
    
    <script>
    	// Could have a popup here to let you choose from beaches    	
    	const beachName = 'Shannon Beach @ Upper Mystic (DCR)';
        const urlParams = new URLSearchParams(window.location.search);
        const isTestMode = urlParams.get('test') === '1';
        
        // Use direct URL for local testing (bypasses CORS proxy)
        const dataURL = window.location.hostname === 'localhost' 
            ? 'https://datavisualization.dph.mass.gov/views/BeachesDashboard-CloudVersion-2025/Results.csv?refresh=y&Name=' + encodeURIComponent(beachName)
            : 'https://jalkut.com/water/beachdata.php?b=' + beachName;

        // Test data in CSV format
        const testData = `Date and Time,Indicator,Threshold: Single-Sample,Date and Time,Results
7/9/2024 8:12:00 AM,Enterococci,61,7/9/2024 8:12:00 AM,88
7/1/2024 8:47:00 AM,Enterococci,61,7/1/2024 8:47:00 AM,61
6/24/2024 9:13:00 AM,Enterococci,61,6/24/2024 9:13:00 AM,26
6/19/2024 3:00:00 AM,Enterococci,61,6/19/2024 3:00:00 AM,"1,410"
6/18/2024 9:02:00 AM,Enterococci,61,6/18/2024 9:02:00 AM,240
6/11/2024 8:21:00 AM,Enterococci,61,6/11/2024 8:21:00 AM,12
6/4/2024 9:08:00 AM,Enterococci,61,6/4/2024 9:08:00 AM,0.5
5/28/2024 7:48:00 AM,Enterococci,61,5/28/2024 7:48:00 AM,"2,420"
5/21/2024 9:40:00 AM,Enterococci,61,5/21/2024 9:40:00 AM,41`;

        async function fetchData() {
            if (isTestMode) {
                // Return test data immediately
                return new Promise(resolve => {
                    // Add a small delay to simulate loading
                    setTimeout(() => resolve(testData), 500);
                });
            }
            
            try {
                const response = await fetch(dataURL, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'text/csv',
                    },
                    mode: 'cors'
                });
                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }
                return await response.text();
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
        
        async function update() {
            const refreshIndicator = document.getElementById('refresh-indicator');
            
            // Show refresh indicator
            refreshIndicator.classList.add('show');
            
            try {
                let data = await fetchData();
                updateWithData(data);
            } catch (error) {
                console.error('Error updating data:', error);
            } finally {
                // Hide refresh indicator after a delay
                setTimeout(() => {
                    refreshIndicator.classList.remove('show');
                }, 2000);
            }
        }
        
        function updateWithData(data) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let insideQuotes = false;
			var pushedColumns = 0;
			
            for (let i = 0; i < data.length; i++) {
                const char = data[i];

                if (char === '"' && (i === 0 || data[i - 1] !== '\\')) {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                	// Skip over fourth column (index 3), redundant date field
                	if (pushedColumns != 3) {
	                    currentRow.push(currentField);
					}
					pushedColumns += 1;
                    currentField = '';
                } else if (char === '\n' && !insideQuotes) {
                    currentRow.push(currentField);                    
                    rows.push(currentRow);
                    currentRow = [];
                    pushedColumns = 0;
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            // Add the last field and row
            currentRow.push(currentField);
            rows.push(currentRow);

            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            const loadingDiv = document.getElementById('loading');
            const dataTable = document.getElementById('data-table');
            const lastUpdatedDiv = document.getElementById('last-updated');

            // Clear existing table data
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            // Set table headers
            const headers = rows[0];
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                th.addEventListener('click', () => sortTableByDate(rows.slice(1)));
                tableHead.appendChild(th);
            });
            
            // Add Status header
            const statusTh = document.createElement('th');
            statusTh.textContent = 'Status';
            statusTh.addEventListener('click', () => sortTableByDate(rows.slice(1)));
            tableHead.appendChild(statusTh);

            // Sort and set table rows
            const sortedRows = sortTableByDate(rows.slice(1));
            sortedRows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach((column, index) => {
                    const td = document.createElement('td');
                    td.textContent = column;
                    tr.appendChild(td);
                });
                
                // Add calculated status column
                const statusTd = document.createElement('td');
                if (row.length >= 3) {
                    // Since we skip column 3 (duplicate date), the indices are:
                    // 0: Date and Time, 1: Indicator, 2: Threshold, 3: Results
                    const threshold = parseFloat(row[2]); // Threshold column
                    const result = parseFloat(row[3]?.replace(/,/g, '') || '0'); // Results column, remove commas
                    
                    console.log('Debug:', { threshold, result, row }); // Debug logging
                    
                    if (result > threshold) {
                        statusTd.innerHTML = `<span class="status-badge status-danger">Above Threshold</span>`;
                    } else if (result === threshold) {
                        statusTd.innerHTML = `<span class="status-badge status-warning">At Threshold</span>`;
                    } else {
                        statusTd.innerHTML = `<span class="status-badge status-safe">Below Threshold</span>`;
                    }
                } else {
                    statusTd.textContent = 'N/A';
                }
                tr.appendChild(statusTd);
                if (tr.innerText !== "") {
                	tableBody.appendChild(tr);
                }
            });

            // Hide loading and show table
            loadingDiv.style.display = 'none';
            dataTable.style.display = 'table';
            
            // Show last updated time
            const testModeText = isTestMode ? ' (Test Mode)' : '';
            lastUpdatedDiv.innerHTML = `Last updated: ${new Date().toLocaleString()}${testModeText}`;
            lastUpdatedDiv.style.display = 'block';
        }
        

  		function sortTableByDate(rows) {
            return rows.sort((b, a) => {
                const dateA = new Date(a[2]); // Assuming date is in the first column
                const dateB = new Date(b[2]); // Adjust the index if date is in a different column
                return dateA - dateB;
            });
        }

        // Start the fetch as soon as possible
        let fetchPromise = fetchData()
            .catch(error => console.error('Error fetching data:', error));

        // Wait for both the fetch to complete and the page to finish loading
        window.addEventListener('load', () => {
            console.log("Page has finished loading.");

            fetchPromise.then(data => {
                updateWithData(data);
				setInterval(update, 5 * 60 * 1000); // Refresh every 5 minutes
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
        });
    </script>
</body>
</html>
