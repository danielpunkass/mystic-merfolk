<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upper Mystic Water Quality</title>
    <meta name="description" content="A concise snapshot of current and recent water conditions at Shannon Beach.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏊‍♂️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f0f9ff 100%);
            min-height: 100vh;
            color: #1a365d;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #0ea5e9;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s ease;
            position: sticky;
            top: 0;
            z-index: 10;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        th:last-child {
            border-right: none;
        }

        th:hover {
            background: #0284c7;
        }

        td {
            background: rgba(255, 255, 255, 0.8);
            transition: background 0.2s ease;
        }

        tr:hover td {
            background: rgba(240, 249, 255, 0.8);
        }

        tr:nth-child(even) td {
            background: rgba(241, 250, 255, 0.5);
        }

        tr:nth-child(even):hover td {
            background: rgba(224, 242, 254, 0.8);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-safe {
            background: #dcfce7;
            color: #166534;
        }

        .status-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .status-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .last-updated {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
                font-size: 0.85rem;
            }

            .table-container {
                border-radius: 12px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            }
        }

        .refresh-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #0ea5e9;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .refresh-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏊‍♂️ Upper Mystic Water Quality</h1>
            <div class="subtitle">A concise snapshot of current and recent water conditions at Shannon Beach. Data from the <a href="https://www.mass.gov/info-details/interactive-beach-water-quality-dashboard">DCR Water Quality</a> site.</div>
        </div>
        
        <div class="card">
            <h2 style="padding: 1.5rem 1.5rem 0; margin: 0; color: #1a365d; font-size: 1.4rem; font-weight: 600;">Current Status</h2>
            <div id="current-status" style="padding: 1.5rem; color: #64748b; font-size: 1.1rem;">
                Status information will be available soon...
            </div>
        </div>
        
        <div class="card">
            <h2 style="padding: 1.5rem 1.5rem; margin: 0; color: #1a365d; font-size: 1.4rem; font-weight: 600;">Recent Test Results</h2>
            <div class="table-container">
                <div id="loading" class="loading">Loading beach data...</div>
                <table id="data-table" style="display: none;">
                    <thead>
                        <tr id="table-head">
                            <!-- Table headers will be inserted here -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Table data will be inserted here -->
                    </tbody>
                </table>
            </div>
            <div id="last-updated" class="last-updated" style="display: none;">
                <!-- Last updated time will be inserted here -->
            </div>
        </div>
    </div>
    
    <div id="refresh-indicator" class="refresh-indicator">
        Refreshing data...
    </div>
    
    <script>
    	// Could have a popup here to let you choose from beaches    	
    	const beachName = 'Shannon Beach @ Upper Mystic (DCR)';
        const urlParams = new URLSearchParams(window.location.search);
        const isTestMode = urlParams.get('test') === '1';
        
        // Use direct URL for local testing (bypasses CORS proxy)
        const dataURL = window.location.hostname === 'localhost' 
            ? 'https://datavisualization.dph.mass.gov/views/BeachesDashboard-CloudVersion-2025/Results.csv?refresh=y&Name=' + encodeURIComponent(beachName)
            : 'https://jalkut.com/water/beachdata.php?b=' + beachName;
            
        const statusURL = window.location.hostname === 'localhost'
            ? 'https://datavisualization.dph.mass.gov/views/BeachesDashboard-CloudVersion-2025/BeachList.csv?:refresh=y&Name=' + encodeURIComponent(beachName)
            : 'https://jalkut.com/water/beachdata.php?u=' + encodeURIComponent('https://datavisualization.dph.mass.gov/views/BeachesDashboard-CloudVersion-2025/BeachList.csv?:refresh=y') + '&b=' + encodeURIComponent(beachName);

        // Test data in CSV format
        const testData = `Date and Time,Indicator,Threshold,Date and Time,Results
5/21/2024 9:40:00 AM,Enterococci,61,5/21/2024 9:40:00 AM,41
5/28/2024 7:48:00 AM,Enterococci,61,5/28/2024 7:48:00 AM,"2,420"
6/4/2024 9:08:00 AM,Enterococci,61,6/4/2024 9:08:00 AM,0.5
6/11/2024 8:21:00 AM,Enterococci,61,6/11/2024 8:21:00 AM,12
6/18/2024 9:02:00 AM,Enterococci,61,6/18/2024 9:02:00 AM,240
6/19/2024 3:00:00 AM,Enterococci,61,6/19/2024 3:00:00 AM,"1,410"
6/24/2024 9:13:00 AM,Enterococci,61,6/24/2024 9:13:00 AM,26
7/1/2024 8:47:00 AM,Enterococci,61,7/1/2024 8:47:00 AM,61
7/9/2024 8:12:00 AM,Enterococci,61,7/9/2024 8:12:00 AM,88
7/16/2024 9:18:00 AM,Enterococci,61,7/16/2024 9:18:00 AM,14
7/18/2024 11:28:00 AM,Enterococci,61,7/18/2024 11:28:00 AM,11
7/23/2024 9:20:00 AM,Enterococci,61,7/23/2024 9:20:00 AM,29
7/30/2024 9:20:00 AM,Enterococci,61,7/30/2024 9:20:00 AM,49
8/7/2024 2:45:00 AM,Enterococci,61,8/7/2024 2:45:00 AM,52
8/7/2024 9:02:00 AM,Enterococci,61,8/7/2024 9:02:00 AM,133
8/13/2024 9:21:00 AM,Enterococci,61,8/13/2024 9:21:00 AM,12
8/14/2024 2:03:00 AM,Enterococci,61,8/14/2024 2:03:00 AM,275
8/20/2024 10:10:00 AM,Enterococci,61,8/20/2024 10:10:00 AM,177
8/22/2024 10:05:00 AM,Enterococci,61,8/22/2024 10:05:00 AM,25
8/27/2024 7:05:00 AM,Enterococci,61,8/27/2024 7:05:00 AM,7
8/28/2024 1:52:00 AM,Enterococci,61,8/28/2024 1:52:00 AM,10
`;
        
        // Test status data in CSV format
        const testStatusData = `Beach Status,Name,Town
Closed,Shannon Beach @ Upper Mystic (DCR),Winchester
`;

        async function fetchData() {
            if (isTestMode) {
                // Return test data immediately
                return new Promise(resolve => {
                    // Add a small delay to simulate loading
                    setTimeout(() => resolve({ samplesData: testData, statusData: testStatusData }), 500);
                });
            }
            
            try {
                // Fetch both samples data and status data in parallel
                const [samplesResponse, statusResponse] = await Promise.all([
                    fetch(dataURL, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'text/csv',
                        },
                        mode: 'cors'
                    }),
                    fetch(statusURL, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'text/csv',
                        },
                        mode: 'cors'
                    })
                ]);
                
                if (!samplesResponse.ok) {
                    throw new Error('Samples data response was not ok ' + samplesResponse.statusText);
                }
                if (!statusResponse.ok) {
                    throw new Error('Status data response was not ok ' + statusResponse.statusText);
                }
                
                const samplesData = await samplesResponse.text();
                const statusData = await statusResponse.text();
                
                return { samplesData, statusData };
            } catch (error) {
                console.error('Error fetching data:', error);
                throw error;
            }
        }
        
        async function update() {
            const refreshIndicator = document.getElementById('refresh-indicator');
            
            // Show refresh indicator
            refreshIndicator.classList.add('show');
            
            try {
                let data = await fetchData();
                updateWithData(data.samplesData, data.statusData);
            } catch (error) {
                console.error('Error updating data:', error);
            } finally {
                // Hide refresh indicator after a delay
                setTimeout(() => {
                    refreshIndicator.classList.remove('show');
                }, 2000);
            }
        }
        
        function updateCurrentStatus(statusData) {
            const currentStatusDiv = document.getElementById('current-status');
            
            try {
                // Parse status CSV data
                const lines = statusData.trim().split('\n');
                if (lines.length < 2) {
                    currentStatusDiv.innerHTML = '<span style="color: #64748b;">Status information unavailable</span>';
                    return;
                }
                
                // Skip header row and get first data row
                const dataRow = lines[1].split(',');
                const status = dataRow[0]?.trim();
                const beachNameFromStatus = dataRow[1]?.trim();
                const town = dataRow[2]?.trim();
                
                if (status) {
                    const statusClass = status.toLowerCase() === 'open' ? 'status-safe' : 'status-danger';
                    const statusText = status.toLowerCase() === 'open' ? 'Open for Swimming' : 'Closed for Swimming';
                    
                    currentStatusDiv.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                            <span class="status-badge ${statusClass}" style="font-size: 1rem; padding: 0.5rem 1rem;">${statusText}</span>
                        </div>
                        <div style="color: #64748b; font-size: 0.9rem;">
                            Beach: ${beachNameFromStatus || beachName}<br>
                            Location: ${town || 'Winchester'}
                        </div>
                    `;
                } else {
                    currentStatusDiv.innerHTML = '<span style="color: #64748b;">Status information unavailable</span>';
                }
            } catch (error) {
                console.error('Error parsing status data:', error);
                currentStatusDiv.innerHTML = '<span style="color: #64748b;">Error loading status information</span>';
            }
        }
        
        function updateWithData(samplesData, statusData) {
            // Process status data first
            updateCurrentStatus(statusData);
            
            // Then process samples data
            const data = samplesData;
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let insideQuotes = false;
			var pushedColumns = 0;
			
            for (let i = 0; i < data.length; i++) {
                const char = data[i];

                if (char === '"' && (i === 0 || data[i - 1] !== '\\')) {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                	// Skip over fourth column (index 3), redundant date field
                	if (pushedColumns != 3) {
	                    currentRow.push(currentField);
					}
					pushedColumns += 1;
                    currentField = '';
                } else if (char === '\n' && !insideQuotes) {
                    currentRow.push(currentField);                    
                    rows.push(currentRow);
                    currentRow = [];
                    pushedColumns = 0;
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            // Add the last field and row
            currentRow.push(currentField);
            rows.push(currentRow);

            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            const loadingDiv = document.getElementById('loading');
            const dataTable = document.getElementById('data-table');
            const lastUpdatedDiv = document.getElementById('last-updated');

            // Clear existing table data
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            // Set table headers
            const headers = rows[0];
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                th.addEventListener('click', () => sortTableByDate(rows.slice(1)));
                tableHead.appendChild(th);
            });
            
            // Add Status header
            const statusTh = document.createElement('th');
            statusTh.textContent = 'Status';
            statusTh.addEventListener('click', () => sortTableByDate(rows.slice(1)));
            tableHead.appendChild(statusTh);

            // Sort and set table rows
            const sortedRows = sortTableByDate(rows.slice(1));
            sortedRows.forEach(row => {
            	if (row.length < 3) {
					return;
            	}

                const tr = document.createElement('tr');
                row.forEach((column, index) => {
                    const td = document.createElement('td');
                    td.textContent = column;
                    tr.appendChild(td);
                });
                
                // Add calculated status column
                const statusTd = document.createElement('td');
                if (row.length >= 3) {
                    // Since we skip column 3 (duplicate date), the indices are:
                    // 0: Date and Time, 1: Indicator, 2: Threshold, 3: Results
                    const threshold = parseFloat(row[2]); // Threshold column
                    const result = parseFloat(row[3]?.replace(/,/g, '') || '0'); // Results column, remove commas
                    
                    console.log('Debug:', { threshold, result, row }); // Debug logging
                    
                    if (result > threshold) {
                        statusTd.innerHTML = `<span class="status-badge status-danger">Above Threshold</span>`;
                    } else if (result === threshold) {
                        statusTd.innerHTML = `<span class="status-badge status-warning">At Threshold</span>`;
                    } else {
                        statusTd.innerHTML = `<span class="status-badge status-safe">Below Threshold</span>`;
                    }
                }
                tr.appendChild(statusTd);
                if (tr.innerText !== "") {
                	tableBody.appendChild(tr);
                }
            });

            // Hide loading and show table
            loadingDiv.style.display = 'none';
            dataTable.style.display = 'table';
            
            // Show last updated time
            const testModeText = isTestMode ? ' (Test Mode)' : '';
            lastUpdatedDiv.innerHTML = `Last updated: ${new Date().toLocaleString()}${testModeText}`;
            lastUpdatedDiv.style.display = 'block';
        }
        

  		function sortTableByDate(rows) {
            return rows.sort((a, b) => {
                const dateA = new Date(a[0]); // First column contains the date
                const dateB = new Date(b[0]); // First column contains the date
                return dateB - dateA; // Most recent first (descending order)
            });
        }

        // Start the fetch as soon as possible
        let fetchPromise = fetchData()
            .catch(error => console.error('Error fetching data:', error));

        // Wait for both the fetch to complete and the page to finish loading
        window.addEventListener('load', () => {
            console.log("Page has finished loading.");

            fetchPromise.then(data => {
                updateWithData(data.samplesData, data.statusData);
				setInterval(update, 5 * 60 * 1000); // Refresh every 5 minutes
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
        });
    </script>
</body>
</html>
